<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.site_title }} - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

        :root {
            --primary: {{ config.colors[config.theme].primary }};
            --secondary: {{ config.colors[config.theme].secondary }};
            --accent: {{ config.colors[config.theme].accent }};
            --bg: {{ config.colors[config.theme].background }};
            --card-bg: {{ config.colors[config.theme].card_bg }};
            --text: {{ config.colors[config.theme].text }};
            --danger: {{ config.colors[config.theme].danger }};
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Particle canvas */
        #particle-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
        }

        /* Animated background blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.18;
            pointer-events: none;
            z-index: 0;
            animation: blobFloat 9s ease-in-out infinite;
        }
        .blob-1 {
            width: 420px; height: 420px;
            background: var(--primary);
            top: -120px; left: -120px;
            animation-delay: 0s;
        }
        .blob-2 {
            width: 340px; height: 340px;
            background: var(--secondary);
            bottom: -100px; right: -100px;
            animation-delay: 3s;
        }
        .blob-3 {
            width: 220px; height: 220px;
            background: var(--accent);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 1.5s;
            opacity: 0.09;
        }

        @keyframes blobFloat {
            0%, 100% { transform: scale(1) translate(0, 0); }
            33%       { transform: scale(1.08) translate(20px, -15px); }
            66%       { transform: scale(0.95) translate(-15px, 10px); }
        }

        /* Grid pattern */
        .grid-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: radial-gradient(circle at center, black, transparent 75%);
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 380px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 38px 32px 32px;
            backdrop-filter: blur(24px) saturate(1.6);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.05) inset,
                0 30px 70px -20px rgba(0,0,0,0.65);
            animation: cardRise 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardRise {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 15%; right: 15%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent);
            border-radius: 4px;
            opacity: 0.8;
        }

        /* Logo */
        .logo-wrap {
            width: 76px;
            height: 76px;
            border-radius: 20px;
            margin: 0 auto 20px;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.14),
                0 14px 34px -10px rgba(0,0,0,0.55);
        }

        .logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .logo-wrap .fallback {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #000;
        }

        /* Pulse ring on logo */
        .logo-ring {
            position: absolute;
            inset: -3px;
            border-radius: 23px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            z-index: -1;
            opacity: 0.5;
            animation: ringPulse 2.4s ease-in-out infinite;
        }

        @keyframes ringPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50%       { opacity: 0.85; transform: scale(1.04); }
        }

        h1 {
            font-size: 23px;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-align: center;
        }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-align: center;
            margin-top: 6px;
            color: var(--primary);
            opacity: 0.75;
        }

        /* Status bar */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 9px;
            margin: 24px 0 18px;
            padding: 11px 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 11px;
            position: relative;
            overflow: hidden;
        }
        .status-bar::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--primary) 6%, transparent), transparent);
            animation: statusSheen 3s ease-in-out infinite;
        }
        @keyframes statusSheen {
            0%, 100% { transform: translateX(-100%); }
            50%       { transform: translateX(100%); }
        }

        .pulse-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--primary);
            flex-shrink: 0;
            animation: pulse 1.8s ease-in-out infinite;
            box-shadow: 0 0 10px var(--primary);
            position: relative;
            z-index: 1;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--primary); transform: scale(1); }
            50%       { opacity: 0.4; box-shadow: 0 0 2px var(--primary); transform: scale(1.4); }
        }

        .status-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            opacity: 0.55;
            position: relative;
            z-index: 1;
        }

        /* Error */
        .error-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 60, 60, 0.08);
            border: 1px solid rgba(255, 60, 60, 0.3);
            border-radius: 11px;
            padding: 12px 14px;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--danger);
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }
        @keyframes shake {
            10%, 90% { transform: translateX(-1px); }
            20%, 80% { transform: translateX(2px); }
            30%, 50%, 70% { transform: translateX(-4px); }
            40%, 60% { transform: translateX(4px); }
        }

        /* Label */
        label.field-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            opacity: 0.45;
            margin-bottom: 8px;
        }

        /* Input group */
        .input-group {
            position: relative;
            margin-bottom: 22px;
        }

        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            padding: 14px 46px 14px 16px;
            border-radius: 13px;
            outline: none;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .input-group input::placeholder {
            opacity: 0.3;
            letter-spacing: 0.12em;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 18%, transparent),
                        0 0 24px -8px var(--primary);
            transform: translateY(-1px);
        }

        .eye-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.4;
            transition: all 0.2s;
            color: var(--text);
            font-size: 15px;
        }

        .eye-btn:hover { opacity: 0.9; transform: translateY(-50%) scale(1.15); }

        /* Submit button */
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            background-size: 200% 200%;
            border: none;
            border-radius: 13px;
            color: #000;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.25s;
            box-shadow: 0 10px 24px -6px var(--primary);
            animation: gradientShift 4s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50%       { background-position: 100% 50%; }
        }

        .btn-login::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            pointer-events: none;
        }

        .btn-login:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 16px 34px -6px var(--primary);
        }

        .btn-login:active { transform: translateY(0) scale(0.99); }

        /* Footer */
        .footer {
            margin-top: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .footer img {
            width: 18px;
            height: 18px;
            border-radius: 6px;
            object-fit: cover;
            opacity: 0.6;
        }

        .footer-text {
            font-size: 11px;
            opacity: 0.35;
            letter-spacing: 0.06em;
        }

        /* Corner badge */
        .corner-badge {
            position: fixed;
            top: 16px;
            right: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.12em;
            padding: 5px 11px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.1);
            opacity: 0.45;
            z-index: 10;
            backdrop-filter: blur(6px);
            animation: fadeIn 0.8s ease 0.3s both;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 0.45; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-bg"></div>
    <div class="corner-badge">{{ config.theme|upper }}</div>

    <div class="card">
        <!-- Logo -->
        <div class="relative" style="width:72px;margin:0 auto 20px;">
            <div class="logo-ring"></div>
            <div class="logo-wrap">
                <img src="/static/icon.png" alt="logo"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="fallback" style="display:none">
                    <i class="fas fa-server"></i>
                </div>
            </div>
        </div>

        <h1>{{ config.site_header }}</h1>
        <p class="subtitle">SECURE CONTROL PANEL</p>

        <!-- Status -->
        <div class="status-bar">
            <span class="pulse-dot"></span>
            <span class="status-text">System online &mdash; Awaiting authentication</span>
        </div>

        {% if error %}
        <div class="error-box">
            <i class="fas fa-shield-exclamation"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" id="loginForm">
            <label class="field-label" for="password">Access Key</label>
            <div class="input-group">
                <input type="password"
                       name="password"
                       id="password"
                       placeholder="••••••••••••"
                       required
                       autofocus>
                <i class="fas fa-eye eye-btn" id="toggleIcon" onclick="togglePassword()"></i>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-right-to-bracket" style="margin-right:8px;"></i>
                Authenticate
            </button>
        </form>

        <div class="footer">
            <img src="/static/icon.png" alt="logo" onerror="this.style.display='none'">
            <span class="footer-text">POWERED BY TEAM MHN &nbsp;|&nbsp; UNAUTHORIZED ACCESS PROHIBITED</span>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Ambient particle background
        (function () {
            const canvas = document.getElementById('particle-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let w, h, particles;

            const rootStyles = getComputedStyle(document.documentElement);
            const primaryColor = rootStyles.getPropertyValue('--primary').trim() || '#22d3ee';
            const secondaryColor = rootStyles.getPropertyValue('--secondary').trim() || '#a855f7';

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            function makeParticles(count) {
                const arr = [];
                for (let i = 0; i < count; i++) {
                    arr.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        r: Math.random() * 1.6 + 0.4,
                        vx: (Math.random() - 0.5) * 0.2,
                        vy: (Math.random() - 0.5) * 0.2,
                        color: Math.random() > 0.5 ? primaryColor : secondaryColor,
                        alpha: Math.random() * 0.5 + 0.15
                    });
                }
                return arr;
            }

            particles = makeParticles(window.innerWidth < 640 ? 30 : 50);

            function tick() {
                ctx.clearRect(0, 0, w, h);
                for (const p of particles) {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0) p.x = w;
                    if (p.x > w) p.x = 0;
                    if (p.y < 0) p.y = h;
                    if (p.y > h) p.y = 0;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.alpha;
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                requestAnimationFrame(tick);
            }
            tick();
        })();
    </script>
</body>
</html>
